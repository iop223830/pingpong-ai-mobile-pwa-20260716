function coachTaskGoal(){if(!state.tasksAssigned)return `<div class="goal-item"><span class="check"></span><div><b>接收教练训练任务</b><span class="muted">等待教练确认教案后出现</span></div><span class="tag gray">待安排</span></div>`;if(state.tasksDone)return `<div class="goal-item"><span class="check done">✓</span><div><b>教练任务已完成</b><span class="muted">已同步至成长档案</span></div><span class="tag green">完成</span></div>`;return `<div class="goal-item"><span class="check"></span><div><b>教练任务：正手前送练习</b><span class="muted">4 组 × 20 球 · 注意在身体前侧触球</span></div>${btn('完成任务','complete-task','btn primary small')}</div>`}
function studentHome(){let rank=state.privacy.ranking?'<b>同龄组第 12 名</b>':'已隐藏';return shell(`${pageHead('今日训练','下一步，练什么？','你的训练建议已结合最近评测与教练反馈更新。',btn('开始一次 AI 评测','new-assessment','btn primary'))}<section class="home-hero"><div><span class="tag yellow">进阶 2</span><h1>林予安，下午好。</h1><p>先把击球点往前送半拍。完成这组正手攻球练习后，再做一次复测。</p>${btn('开始正手攻球训练','new-assessment','btn primary')}<div class="hero-streak"><span class="streak-num">4</span><span class="streak-copy">连续训练天数<br>本周已完成 2 / 3 次</span></div></div><div class="court-visual"><div class="court"></div><div class="arc"></div><div class="ball"></div></div></section><section class="grid weekly" style="margin-top:15px"><div class="card"><div style="display:flex;justify-content:space-between"><h2 class="section-title">本周训练目标</h2><span class="muted" style="font-size:12px">2 / 3 已推进</span></div><div class="goal-item"><span class="check done">✓</span><div><b>正手攻球 · 节奏练习</b><span class="muted">3 组 × 20 球</span></div><span class="tag green">完成</span></div><div class="goal-item"><span class="check"></span><div><b>上台率提升至 78%</b><span class="muted">在下一次评测中验证</span></div><span class="tag yellow">进行中</span></div>${coachTaskGoal()}</div><div class="card"><h2 class="section-title">最近评测</h2><div style="display:flex;justify-content:space-between;align-items:flex-end"><div><span class="muted">正手攻球 · 07/15</span><div class="score">82 <small style="font-size:12px;color:var(--good)">+6</small></div></div>${btn('查看报告','open-report','btn ghost small')}</div><div class="divider"></div><div class="insight"><b>优先改进：击球点偏晚</b><br>将重心前移，在来球上升期完成触球。</div></div></section><section class="grid weekly" style="margin-top:15px"><div class="card"><h2 class="section-title">教练留言</h2><div class="coach-note">${avatar({initial:'顾',avatar:'#3d3839'})}<div><b>顾言教练</b><p class="muted" style="margin:3px 0 9px">“你的挥拍轨迹更稳定了。下一节先慢节奏把击球点固定住。”</p>${btn('查看对应任务','coach-task','btn ghost small')}</div></div></div><div class="card"><h2 class="section-title">本周场馆榜 <span class="tag gray">隐私保护</span></h2><div class="rank-sneak"><div class="rank-bubble"><span class="rank-no">#12</span><span>${rank}<br><small class="muted">按近 30 天进步值</small></span></div>${btn(state.privacy.ranking?'去排行榜':'管理隐私','ranking','btn ghost small')}</div></div></section>`, '训练首页')}
function stepBar(step){return `<div class="steps">${['选择项目','场地与设备','球台校准','开始录制'].map((n,i)=>`<div class="step ${step===i+1?'active':step>i+1?'complete':''}"><span class="step-num">${step>i+1?'✓':i+1}</span><b>${n}</b></div>`).join('')}</div>`}
function assessment(){let a=state.assessment,body='';if(a.step===1){let opts=[['正手攻球','建立稳定的前冲弧线','↗'],['反手推挡','观察控制与连续性','↖'],['发球','分析抛球、触球与落点','◌'],['步法','识别重心与移动节奏','⌁'],['自由练习','自由记录一段训练','◎']];body=`<h2 class="section-title">本次想评测什么？</h2><p class="muted">选择训练项目，系统会据此调整采集与分析维度。</p><div class="grid" style="grid-template-columns:repeat(2,1fr);margin-top:18px">${opts.map(([x,d,i])=>`<button class="select-option ${a.project===x?'selected':''}" data-project="${x}"><i style="color:var(--yellow);font-style:normal;font-size:20px">${i}</i><strong>${x}</strong><span>${d}</span></button>`).join('')}</div>`}else if(a.step===2){body=`<h2 class="section-title">确认场地与设备</h2><p class="muted">请把手机固定在球台侧后方，确保全身与球台完整入镜。</p><div class="setup-list"><div class="setup-item"><span>球台位置已识别</span><span class="tag green"><i class="status-dot"></i>正常</span></div><div class="setup-item"><span>手机支架方向</span><span class="tag green"><i class="status-dot"></i>侧后方 45°</span></div><div class="setup-item"><span>环境光线</span><span class="tag yellow"><i class="status-dot warn"></i>可用，建议更亮</span></div><div class="setup-item"><span>深度感知（LiDAR）</span><span class="tag gray">未检测到 · 使用普通视觉模式</span></div></div><div class="insight" style="margin-top:18px">即使没有 LiDAR，也可以完成评测。请尽量避免逆光与画面晃动。</div>`}else if(a.step===3){body=`<h2 class="section-title">调整球台四角</h2><p class="muted">依次点按画面上的四个标记，确认球台边界。已确认 ${a.calibrated} / 4 个。</p><div class="calib" style="margin-top:16px"><div class="calib-table"></div><div class="calib-net"></div>${[1,2,3,4].map(n=>`<button class="corner c${n} ${a.calibrated>=n?'hidden':''}" data-action="calibrate" data-corner="${n}">${n}</button>`).join('')}<span style="position:absolute;bottom:13px;left:14px;font-size:11px;color:var(--muted)">请对齐球台边缘；也可在普通视觉模式下继续。</span></div>`}else if(a.step===4){let time=`00:${String(a.seconds).padStart(2,'0')}`;body=`<h2 class="section-title">${a.recording?'正在采集动作':'准备开始录制'}</h2><p class="muted">骨架点、球台边界仅用于本次评测。录制结束后可在隐私设置中管理视频。</p><div class="record-stage" style="margin-top:16px"><span class="rec-badge">● ${a.recording?'REC':'待录制'}</span><span class="rec-time">${time}</span><div class="skeleton"><i class="sk-head"></i><i class="sk-line sk-body"></i><i class="sk-line sk-arm1"></i><i class="sk-line sk-arm2"></i><i class="sk-line sk-leg1"></i><i class="sk-line sk-leg2"></i></div><div class="mini-court"></div><span style="position:absolute;bottom:14px;left:15px;font-size:11px;color:#e3d9da">人体入镜 <b style="color:var(--good)">良好</b>　·　光线 <b style="color:var(--yellow)">可用</b></span></div>${a.recording&&a.seconds>7?'<div class="insight" style="margin-top:13px">已采集到足够动作片段。结束后将给出可操作的改进建议。</div>':''}`};let primary='';if(a.step<4)primary=btn(a.step===3&&a.calibrated<4?'继续普通视觉模式':'下一步','assessment-next','btn primary');else primary=a.recording?btn('结束并分析','finish-record','btn primary'):btn('开始录制','start-record','btn primary');return shell(`${pageHead('AI 评测',a.step===4?'动作采集':a.step===3?'球台校准':'新建评测','四步完成一次动作采集。AI 结果仅作训练参考，建议由教练确认。')}<div class="assessment-layout">${stepBar(a.step)}<div class="card assessment-card">${body}</div><div style="display:flex;justify-content:space-between;margin-top:15px">${a.step>1?btn('上一步','assessment-prev','btn ghost'): '<span></span>'}<div style="display:flex;gap:8px">${btn('保存稍后继续','save-later','btn ghost')}${primary}</div></div></div>`, 'AI 评测')}
function analysing(){return shell(`${pageHead('AI 评测','正在生成训练报告','我们正在整理动作阶段、轨迹与落点分布。')}<div class="assessment-layout"><div class="card analysis-loader"><div><div class="scanner"></div><h2 style="margin:24px 0 6px">正在分析 ${state.assessment.project}</h2><p class="muted">识别击球点、挥拍路径与动作稳定性…</p><div class="progress" style="width:240px;margin:17px auto"><span id="analysisProgress" style="width:31%"></span></div></div></div></div>`, 'AI 评测')}
function reportPage(id='r101'){let r=reports.find(x=>x.id===id)||reports[0];return shell(`${pageHead('评测报告',`${r.project} · ${r.student}`,`评测于 ${r.date}　·　AI 结果为训练参考，建议由教练结合实际情况确认。`, `<div style="display:flex;gap:8px">${btn('保存报告','save-report','btn ghost')}${btn('发送给教练','send-report','btn red')}</div>`)}<div class="grid report-grid"><section class="card score-card"><span class="tag yellow">AI 初步分析</span><div class="score-ring"><div class="score-inner"><b>${r.score}</b><span>/ 100</span></div></div><div class="grade"><b>良好</b> · 进阶 2</div><p class="muted" style="font-size:12px;margin:0">动作节奏已建立，关键点仍有改善空间。</p><div class="mini-metrics"><div><small class="muted">动作规范度</small><b>80</b></div><div><small class="muted">挥拍轨迹</small><b>84</b></div><div><small class="muted">上台率</small><b>74%</b></div><div><small class="muted">落点分布</small><b>76</b></div></div></section><section class="card"><div style="display:flex;justify-content:space-between;align-items:center"><h2 class="section-title">本次表现与历史平均</h2><span class="tag green">+6 分</span></div><div class="chart">${chart([69,71,68,75,73,78,82])}</div><div class="chart-labels"><span>6 月 03</span><span>06/17</span><span>07/01</span><span>本次</span></div><div class="legend"><span><i style="background:var(--yellow)"></i>综合评分</span><span><i style="background:#696565"></i>历史平均 74</span></div><div class="divider"></div><div style="display:flex;justify-content:space-between;align-items:center"><h2 class="section-title" style="margin:0">问题片段</h2><span class="muted" style="font-size:11px">点击定位模拟回放</span></div><div class="timeline"><span></span><span class="issue"></span><span class="select"></span><span></span><span class="issue"></span><span></span><span></span><span></span></div><div class="insight"><b>00:18 — 00:24 · 击球点偏晚</b><br>触球时机落在身体侧后方，建议在引拍末端提前送髋。</div></section><aside class="card"><h2 class="section-title">AI 训练建议</h2><div class="ai-note"><b style="color:var(--yellow)">本周先练什么</b><br>固定前冲击球点与重心前移的配合。</div><div class="phase-list" style="margin-top:11px"><div class="phase"><span class="phase-num">1</span><div><b>徒手挥拍</b><small>2 组 × 12 次</small></div><span class="tag gray">热身</span></div><div class="phase active"><span class="phase-num">2</span><div><b>多球正手攻球</b><small>4 组 × 20 球</small></div><span class="tag yellow">重点</span></div><div class="phase"><span class="phase-num">3</span><div><b>半台连续回球</b><small>3 组 × 15 球</small></div><span class="tag gray">巩固</span></div></div>${btn('加入训练计划','add-to-plan','btn primary full','style="margin-top:14px"')}</aside><section class="card" style="grid-column:1/3"><div style="display:flex;justify-content:space-between;align-items:center"><h2 class="section-title">挥拍轨迹</h2><span class="tag gray">理想轨迹对照</span></div><svg viewBox="0 0 680 220" style="width:100%;height:210px;background:#252424;border-radius:8px"><path d="M80 180 C160 126, 210 58, 326 78 S 480 158,580 51" fill="none" stroke="#6c696a" stroke-width="4" stroke-dasharray="8 8"/><path d="M80 179 C145 160, 199 103, 320 114 S 465 162,565 83" fill="none" stroke="#F2B600" stroke-width="5"/><circle cx="365" cy="132" r="11" fill="#680E0E" stroke="#f09090" stroke-width="3"/><line x1="365" y1="132" x2="445" y2="53" stroke="#f09090"/><text x="450" y="51" fill="#f0b0b0" font-size="14">关键偏差：触球稍晚</text><circle cx="80" cy="179" r="7" fill="#F2B600"/><circle cx="565" cy="83" r="7" fill="#F2B600"/><text x="65" y="205" fill="#aaa" font-size="13">引拍</text><text x="548" y="65" fill="#aaa" font-size="13">随挥</text></svg></section><section class="card"><div style="display:flex;justify-content:space-between"><h2 class="section-title">球台落点</h2><button class="btn ghost small" data-action="heat-toggle">正手</button></div><div class="heatmap"><i class="heat" style="left:18%;top:26%"></i><i class="heat red" style="left:32%;top:57%"></i><i class="heat" style="left:67%;top:30%"></i><i class="heat" style="left:78%;top:51%"></i><i class="heat red" style="left:60%;top:67%"></i></div><p class="muted" style="font-size:11px">落点主要集中在对方反手半台，下一步可提高横向分散度。</p></section><section class="card" style="grid-column:1/-1"><h2 class="section-title">动作拆解</h2><div class="phase-list" style="grid-template-columns:repeat(3,1fr);display:grid;column-gap:14px"><div class="phase"><span class="phase-num">1</span><div><b>准备姿势</b><small>重心稳定</small></div><span class="tag green">良好</span></div><div class="phase"><span class="phase-num">2</span><div><b>重心转移</b><small>可更前移</small></div><span class="tag yellow">注意</span></div><div class="phase"><span class="phase-num">3</span><div><b>引拍</b><small>节奏平稳</small></div><span class="tag green">良好</span></div><div class="phase"><span class="phase-num">4</span><div><b>击球点</b><small>略偏身体后侧</small></div><span class="tag red">优先改善</span></div><div class="phase"><span class="phase-num">5</span><div><b>随挥</b><small>方向清晰</small></div><span class="tag green">良好</span></div><div class="phase"><span class="phase-num">6</span><div><b>还原</b><small>回位稍慢</small></div><span class="tag yellow">注意</span></div></div></section></div>`, '评测报告')}
function progressPage(){return shell(`${pageHead('成长档案','你在稳定地变强','把每一次评测和训练都变成看得见的进步。')}<div class="grid progress-grid"><section class="card"><div style="display:flex;justify-content:space-between;align-items:center"><h2 class="section-title">综合评分趋势</h2><div class="periods"><button>周</button><button class="active">月</button><button>季</button></div></div><div class="big-chart">${chart([56,61,62,67,72,76,82], '#F2B600',282)}</div><div class="chart-labels"><span>5 月</span><span>6 月</span><span>7 月</span></div></section><aside class="card"><h2 class="section-title">个人最佳</h2><div class="metric"><span class="label">综合动作评分</span><div class="value">86 <span class="muted" style="font-size:12px">正手攻球</span></div></div><div class="divider"></div><div class="metric"><span class="label">最高上台率</span><div class="value">81%</div></div><div class="divider"></div><div class="metric"><span class="label">连续训练</span><div class="value">7 <span class="muted" style="font-size:12px">天</span></div></div></aside><section class="card"><div style="display:flex;justify-content:space-between"><h2 class="section-title">成长里程碑</h2><span class="tag yellow">已解锁 3</span></div><div class="milestone"><span class="mile-icon">✓</span><div><b>第一次完成评测</b><small class="muted">2026 年 05 月 18 日</small></div></div><div class="milestone"><span class="mile-icon">↗</span><div><b>上台率达到 80%</b><small class="muted">2026 年 06 月 27 日</small></div></div><div class="milestone"><span class="mile-icon">7</span><div><b>连续训练 7 天</b><small class="muted">2026 年 07 月 04 日</small></div></div></section><section class="card"><h2 class="section-title">两个时点对比</h2><div style="display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;text-align:center"><div><span class="tag gray">06/03</span><p class="score">69</p><small class="muted">击球点偏后</small></div><span style="font-size:20px;color:var(--yellow)">→</span><div><span class="tag yellow">07/15</span><p class="score">82</p><small class="muted">下步：提前半拍触球</small></div></div></section></div>`, '成长档案')}
function rankingPage(){let public=state.privacy.ranking;let ranks=[['陆一鸣',91,'+2'],['苏可欣',89,'+8'],['魏嘉宁',87,'+3'],[public?'林予安':'匿名学员',82,'+6'],['何昕',80,'+1']];return shell(`${pageHead('排行榜','看见进步，也保护隐私','排名默认匿名显示；是否公开名称与成绩由你自主决定。')}<div class="card"><div class="rank-controls"><select class="select"><option>同年龄组 · 12–15 岁</option></select><select class="select"><option>星河乒乓俱乐部</option></select><select class="select"><option>近 30 天进步值</option></select></div><div class="divider"></div><div class="table-wrap"><table class="table"><thead><tr><th>排名</th><th>学员</th><th>综合评分</th><th>本期进步</th><th>训练状态</th></tr></thead><tbody>${ranks.map((r,i)=>`<tr><td><b style="color:${i<3?'var(--yellow)':'var(--muted)'}">${i+1}</b></td><td><div class="mini-user">${avatar({initial:r[0].slice(0,1),avatar:'#414141'})}<b>${r[0]}</b></div></td><td><b>${r[1]}</b></td><td><span class="tag green">${r[2]}</span></td><td>${i===3?'<span class="tag yellow">训练中</span>':'<span class="tag gray">本周完成</span>'}</td></tr>`).join('')}</tbody></table></div></div><div class="card" style="margin-top:15px"><h2 class="section-title">排行榜隐私</h2><div class="privacy-row"><div><b>公开我的昵称与成绩</b><small>关闭后将显示为匿名学员，成绩不会被公开。</small></div><button class="switch ${public?'on':''}" data-action="toggle-ranking"></button></div><div class="privacy-row"><div><b>参与公开榜单</b><small>默认关闭。未成年人不建议开启全国公开榜。</small></div><button class="switch" data-action="unavailable"></button></div></div>`, '排行榜')}
function profilePage(){return shell(`${pageHead('个人资料与设置','我的设备与隐私','你可以决定训练数据、视频和公开信息的可见范围。')}<div class="grid" style="grid-template-columns:1fr 1fr"><section class="card"><h2 class="section-title">个人资料</h2><div class="mini-user" style="margin-bottom:17px">${avatar({initial:'林',avatar:'#4b4143'})}<div><b>林予安</b><span>进阶 2 · 星河乒乓俱乐部</span></div></div><label class="form-label">训练目标</label><input class="input" value="提升正手稳定性与连续上台率" style="width:100%"><label class="form-label">紧急联系人</label><input class="input" value="已设置（演示信息）" style="width:100%">${btn('保存资料','save-profile','btn primary','style="margin-top:16px"')}</section><section class="card"><h2 class="section-title">已连接设备</h2><div class="setup-item"><span>手机摄像头</span><span class="tag green">已授权</span></div><div class="setup-item" style="margin-top:9px"><span>深度感知（LiDAR）</span><span class="tag gray">本机不支持</span></div><p class="muted" style="font-size:12px">没有深度感知设备也可以使用普通视觉模式完成评测。</p></section><section class="card" style="grid-column:1/-1"><h2 class="section-title">隐私与数据</h2><div class="privacy-row"><div><b>保存原始训练视频</b><small>默认关闭。仅保存本次报告所需的模拟分析结果。</small></div><button class="switch ${state.privacy.video?'on':''}" data-action="toggle-video"></button></div><div class="privacy-row"><div><b>向教练共享评测报告</b><small>开启后，已发送的报告可由你的教练复核。</small></div><button class="switch on" data-action="unavailable"></button></div><div class="privacy-row"><div><b>在排行榜显示昵称</b><small>默认匿名，你可随时更改。</small></div><button class="switch ${state.privacy.ranking?'on':''}" data-action="toggle-ranking"></button></div></section></div>`, '我的设置')}
function coachDashboard(){let attention=students.filter(s=>s.status==='待跟进');return shell(`${pageHead('教练工作台','今天的训练，需要你优先决定什么？','数据用于辅助教学决策；最终训练判断始终由教练完成。', `<div style="display:flex;gap:8px">${btn('查看实时训练','coach-live','btn ghost')}${btn('生成 AI 教案','coach-plans','btn primary')}</div>`)}<div class="grid dash-kpis">${[['学员总数','28','较上月 +3'],['活跃率','76%','近 7 天 +5%'],['30 天留存','83%','稳定'],['训练完成率','72%','本周 +8%']].map(([a,b,c],i)=>`<div class="card metric"><span class="label">${a}</span><div class="value">${b}</div><span class="delta ${i===2?'':' '} ">${c}</span></div>`).join('')}</div><div class="grid dash-main" style="margin-top:15px"><section class="card"><div style="display:flex;justify-content:space-between"><h2 class="section-title">今日课程</h2><span class="muted" style="font-size:12px">07 月 15 日 · 周三</span></div><div class="time-slot"><time>16:00</time><div class="lesson"><b>基础班 · 正反手基本功</b><small>6 名学员 · 进行中</small></div></div><div class="time-slot"><time>17:30</time><div class="lesson" style="border-color:#8d8588"><b>进阶组 · 前冲弧圈</b><small>4 名学员 · 即将开始</small></div></div><div class="time-slot"><time>19:00</time><div class="lesson" style="border-color:#8d8588"><b>一对一 · 林予安</b><small>击球点与连续性 · 已生成建议</small></div></div><div class="divider"></div>${btn('创建课程','coach-schedule','btn ghost small')}</section><section class="card"><h2 class="section-title">需要优先介入</h2>${attention.map(s=>`<div class="attention"><b>${s.name} · ${s.issue}</b><p>${s.name==='陈子昂'?'近 2 次评分下降，建议本周主动联系。':'已 16 天未训练，建议安排一节激活课。'}</p><button class="btn ghost small" data-student="${s.id}" data-action="student-detail" style="margin-top:8px">查看学员</button></div>`).join('')}</section></div><section class="card" style="margin-top:15px"><div style="display:flex;justify-content:space-between"><h2 class="section-title">今日训练状态</h2>${btn('实时看板','coach-live','btn ghost small')}</div><div class="status-list">${students.slice(0,5).map(s=>`<div class="student-item">${avatar(s)}<div><b>${s.name}</b><span>${s.goal} · 最近 ${s.last}</span></div>${statusTag(s.status)}</div>`).join('')}</div></section>`, '工作台')}
function spark(points){let w=80,h=24,max=100,min=35;return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><polyline points="${points.map((v,i)=>`${i*w/(points.length-1)},${h-(v-min)/(max-min)*h}`).join(' ')}" fill="none" stroke="${points.at(-1)>=points[0]?'#F2B600':'#d66060'}" stroke-width="2"/></svg>`}
function coachStudents(){let filtered=students.filter(s=>s.name.includes(state.query)||s.level.includes(state.query)||s.issue.includes(state.query));return shell(`${pageHead('学员管理','把注意力放在真正需要你的学员身上','搜索、筛选或切换视图，快速查看学员的趋势、训练状态与待跟进问题。')}<div class="student-toolbar"><input class="input" id="studentSearch" placeholder="搜索姓名、等级或问题" value="${esc(state.query)}"><select class="select"><option>全部水平</option><option>基础</option><option>进阶</option></select><select class="select"><option>全部训练状态</option></select><span style="flex:1"></span>${btn('▦','view-table','btn ghost small')}${btn('▤','view-cards','btn ghost small')}</div><div class="grid student-cards" style="margin-top:15px">${filtered.map(s=>`<article class="card student-card" data-action="student-detail" data-student="${s.id}"><div class="student-top">${statusTag(s.status)}<span class="tag ${s.change>=0?'green':'red'}">${s.change>=0?'+':''}${s.change}</span></div><div class="student-name" style="margin:13px 0">${avatar(s)}<div><b>${s.name}</b><span class="muted">${s.level}</span></div></div><div style="display:flex;justify-content:space-between;align-items:end"><div><small class="muted">最近评分</small><div class="score">${s.score}</div></div>${spark(s.trend)}</div><div class="divider"></div><div style="font-size:12px"><span class="muted">主要问题</span><br><b>${s.issue}</b></div><div style="margin-top:10px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:5px"><span class="muted">本周训练完成度</span><span>${s.attendance}%</span></div><div class="progress"><span style="width:${s.attendance}%"></span></div></div></article>`).join('')||'<div class="empty" style="grid-column:1/-1">没有匹配的学员。请尝试其他关键词。</div>'}</div>`, '学员管理')}
function coachStudentDetail(id=state.selectedStudent){let s=students.find(x=>x.id===id)||students[0];return shell(`${pageHead('学员管理',s.name,`${s.level} · 最近训练 ${s.last} · ${s.status}`,btn('分配训练任务','assign-task','btn primary'))}<div class="grid student-detail"><aside class="card profile-block">${avatar(s)}<h2 style="margin:0">${s.name}</h2><p class="muted">${s.level} · 加入 14 周</p><span class="tag ${s.change>=0?'green':'red'}">近 30 天 ${s.change>=0?'+':''}${s.change} 分</span><div class="divider"></div><div style="text-align:left"><small class="muted">训练目标</small><p><b>${s.goal}</b></p><small class="muted">常见问题</small><p><span class="tag red">${s.issue}</span></p></div></aside><section class="grid"><div class="card"><div style="display:flex;justify-content:space-between"><h2 class="section-title">评分趋势</h2><span class="tag yellow">最近 ${s.score}</span></div><div class="chart">${chart(s.trend)}</div><div class="chart-labels"><span>5 月</span><span>6 月</span><span>本周</span></div></div><div class="card"><h2 class="section-title">教练点评</h2><textarea id="coachNote" class="note-box">${s.name==='林予安'?'击球点改善明显。下节课请先用慢节奏固定前送，再逐渐提高连续回球数量。':''}</textarea><div style="display:flex;gap:8px;margin-top:9px">${btn('保存点评','save-note','btn primary small')}${btn('＋ 添加标签','tag-note','btn ghost small')}${btn('语音入口','voice-note','btn ghost small')}</div></div><div class="card"><div style="display:flex;justify-content:space-between"><h2 class="section-title">单次报告</h2>${btn('查看全部','coach-reviews','btn ghost small')}</div><div class="table-wrap"><table class="table"><thead><tr><th>日期</th><th>项目</th><th>评分</th><th>状态</th><th></th></tr></thead><tbody>${reports.filter(r=>r.student===s.name).concat(reports.slice(0,2)).map((r,i)=>`<tr><td>${r.date}</td><td>${r.project}</td><td class="score">${r.score}</td><td>${statusTag(i?'已确认':r.status)}</td><td>${btn('复核','coach-reviews','btn ghost small')}</td></tr>`).join('')}</tbody></table></div></div></section></div>`, `学员详情 · ${s.name}`)}
function coachLive(){return shell(`${pageHead('实时训练看板','同一时间，看清每位学员的状态','模拟实时数据轮播中。黄色为需关注，深红为明显异常；不会使用高频闪烁。')}<div class="grid live-grid">${students.slice(0,6).map((s,i)=>`<article class="card live-card ${i===0?'focus':''}" data-action="live-detail" data-student="${s.id}"><div class="live-head">${statusTag(s.status==='待跟进'?'明显异常':s.status==='训练中'?'需要关注':'训练中')}<span class="muted" style="font-size:11px">实时</span></div><div class="student-name" style="margin:12px 0">${avatar(s)}<div><b>${s.name}</b><span class="muted">${i%2?'反手推挡':'正手攻球'}</span></div></div><div class="live-court"><i class="live-dot" style="left:${18+i*9}%;top:${25+i*7}%"></i><i class="live-dot" style="left:${57-i*5}%;top:${40+i*6}%"></i><i class="live-dot" style="left:${32+i*8}%;top:${55-i*5}%"></i></div><div style="display:flex;justify-content:space-between;align-items:end"><div><small class="muted">实时上台率</small><b class="live-rate" data-rate="${74+i*2}">${74+i*2}%</b></div><div class="live-quality">${i===2?'！':s.score}</div></div><p class="muted" style="font-size:11px;margin:9px 0 0">${i===2?'重心明显偏后，建议及时介入。':i===0?'击球点稍晚，可发送简短提示。':'动作质量稳定。'}</p></article>`).join('')}</div>`, '实时训练')}
function reviewsPage(){let selected=reports.find(r=>r.id===state.reviewId)||reports[0];let pending=reports.filter(r=>r.status==='待教练复核');return shell(`${pageHead('报告复核','将 AI 判断变成可执行的教学意见','AI 生成的是草案；确认、修改或驳回始终由教练完成。')}<div class="grid review-layout"><aside class="card tight"><div style="display:flex;justify-content:space-between;align-items:center;padding:4px 4px 9px"><h2 class="section-title" style="margin:0">待复核 ${pending.length}</h2><select class="select" style="font-size:11px;padding:5px"><option>高风险优先</option></select></div>${pending.map(r=>`<div class="review-row ${r.id===selected.id?'selected':''}" data-action="select-review" data-report="${r.id}"><div style="display:flex;justify-content:space-between"><b>${r.student} · ${r.project}</b>${statusTag(r.risk==='高'?'高风险':'中风险')}</div><small>${r.date} · ${r.issue}</small></div>`).join('')}</aside><section class="card"><div style="display:flex;justify-content:space-between;align-items:start"><div><span class="tag yellow">AI 初步结论</span><h2 style="margin:9px 0 3px">${selected.student} · ${selected.project}</h2><p class="muted" style="margin:0">评分 ${selected.score} · ${selected.date}</p></div>${btn('查看完整报告','open-selected-report','btn ghost small')}</div><div class="divider"></div><div class="insight"><b>主要问题：${selected.issue}</b><br>建议在下一次多球练习中，引导学员提前触球并加强重心前送。</div><label class="form-label">教练复核意见（可覆盖或补充 AI 建议）</label><textarea id="reviewText" class="note-box">动作整体稳定。保留“提前击球点”的建议，下一课先做慢节奏固定练习，再进连续回合。</textarea><div class="review-actions" style="margin-top:13px">${btn('确认并发送','confirm-review','btn primary')}${btn('修改后确认','edit-confirm','btn ghost')}${btn('驳回 AI 判断','reject-review','btn red')}</div><p class="muted" style="font-size:11px">确认后将留下“教练确认”标识，学员看到的最终建议会清楚标明来源。</p></section></div>`, '报告复核')}
function plansPage(){let plan = state.planGenerated?`<div class="card plan-output"><div style="display:flex;justify-content:space-between;align-items:center"><div><span class="tag yellow">AI 生成草案</span><h2 class="section-title" style="margin:7px 0 0">正手击球点前送 · 45 分钟</h2></div><span class="tag gray">教练最终确认</span></div><p class="muted" style="font-size:12px">每一环节均可编辑、拖动排序或复制为模板。</p>${[['08 分钟','动态热身','激活髋部与重心转换','全组'],['12 分钟','徒手挥拍','固定触球点在身体前侧','林予安'],['15 分钟','多球正手攻球','4 组 × 20 球，逐组提速','林予安'],['07 分钟','半台对攻','保持连续性与回位','小组'],['03 分钟','放松复盘','记录本节最稳定的感觉','全组']].map((x,i)=>`<div class="plan-part"><span class="drag">⠿</span><div><b>${x[1]}</b><small class="muted">${x[2]}</small></div><b style="color:var(--yellow);font-size:12px">${x[0]}</b><span class="tag gray">${x[3]}</span></div>`).join('')}<div style="display:flex;gap:8px;margin-top:14px">${btn('分配给学员','assign-task','btn primary')}${btn('复制为模板','copy-plan','btn ghost')}</div></div>`:'<div class="empty" style="margin-top:18px">填写条件后，AI 会生成可编辑的课程草案。</div>';return shell(`${pageHead('AI 教案与课程计划','把诊断转成一节可执行的课','AI 负责整理草案，教练负责判断、编辑与最终确认。')}<div class="card"><div class="plan-form"><select class="select"><option>林予安</option><option>进阶小组</option></select><select class="select"><option>改善击球点与上台率</option></select><select class="select"><option>45 分钟</option></select><select class="select"><option>多球 + 半台</option></select></div>${btn(state.planGenerated?'重新生成草案':'生成 AI 教案','generate-plan','btn primary','style="margin-top:14px"')}${plan}</div>`, 'AI 教案')}
function schedulePage(){return shell(`${pageHead('课程与提醒','安排本周课程','课程容量与提醒仅用于教学运营，不涉及收费或订阅。',btn('创建课程','create-lesson','btn primary'))}<div class="grid" style="grid-template-columns:1.35fr .8fr"><section class="card"><h2 class="section-title">本周课程</h2>${[['今天 16:00','基础班 · 正反手基本功','6 / 8 人','进行中'],['今天 17:30','进阶组 · 前冲弧圈','4 / 6 人','即将开始'],['今天 19:00','一对一 · 林予安','1 / 1 人','已安排'],['周五 18:30','步法与连续性小组课','8 / 8 人','容量已满']].map(x=>`<div class="time-slot"><time>${x[0]}</time><div class="lesson"><b>${x[1]}</b><small>${x[2]} · ${x[3]}</small></div></div>`).join('')}</section><aside class="card"><h2 class="section-title">提醒</h2><div class="attention"><b>课程容量提醒</b><p>周五步法课已满；可考虑加开时段或建立候补名单。</p></div><div class="attention" style="background:#332f22;border-color:rgba(242,182,0,.27)"><b>3 份报告待复核</b><p>优先处理高风险动作问题，避免训练建议滞后。</p></div></aside></div>`, '课程安排')}
function operationsPage(){return shell(`${pageHead('管理视图','训练服务运行概览','仅对具备权限的教练显示。用于观察活跃、留存、课程完成与教练人效。')}<div class="grid operations-kpis">${[['学员活跃','76%'],['30 天留存','83%'],['课程完成率','72%'],['教练人效','14.6 节/周'],['评测转任务','68%']].map(x=>`<div class="card metric"><span class="label">${x[0]}</span><div class="value" style="font-size:21px">${x[1]}</div></div>`).join('')}</div><div class="grid" style="grid-template-columns:1fr 1fr; margin-top:15px"><section class="card"><h2 class="section-title">训练转化漏斗</h2><div class="funnel"><div><span>完成评测</span><b>186</b></div><div><span>加入训练任务</span><b>147</b></div><div><span>完成训练任务</span><b>111</b></div><div><span>近 30 天留存</span><b>94</b></div></div></section><section class="card"><h2 class="section-title">训练时段分布</h2><div class="bars">${[['14',38],['15',55],['16',87],['17',100],['18',83],['19',67],['20',44]].map(x=>`<div style="height:${x[1]}%"><span>${x[0]}:00</span></div>`).join('')}</div></section><section class="card" style="grid-column:1/-1"><h2 class="section-title">需要关注的运营预警</h2><div class="grid" style="grid-template-columns:repeat(3,1fr)"><div class="attention"><b>6 位学员超过 10 天未训练</b><p>建议安排唤醒联系或低门槛复训任务。</p></div><div class="attention"><b>周五 18:30 课程容量过载</b><p>当前 8 / 8 人，建议增开或分流。</p></div><div class="attention"><b>“重心偏后”出现频率偏高</b><p>近 7 天 12 份报告出现，建议统一加入热身环节。</p></div></div></section></div>`, '管理视图')}
function modalLive(s){return `<div class="live-expanded" id="liveModal"><div class="modal"><div class="modal-head"><div><span class="tag yellow">实时训练详情</span><h2 style="margin:7px 0 0">${s.name} · 正手攻球</h2></div>${btn('×','close-live','icon-btn')}</div><div class="grid" style="grid-template-columns:1fr 1fr"><div class="record-stage"><div class="skeleton"><i class="sk-head"></i><i class="sk-line sk-body"></i><i class="sk-line sk-arm1"></i><i class="sk-line sk-arm2"></i><i class="sk-line sk-leg1"></i><i class="sk-line sk-leg2"></i></div><div class="mini-court"></div></div><div><div class="card tight"><small class="muted">近 1 分钟上台率</small><div class="score">76%</div><div class="chart" style="height:100px">${chart([69,74,70,78,76,80,76], '#F2B600',100)}</div></div><div class="card tight" style="margin-top:11px"><b>当前关注点</b><p class="muted">击球点略偏后，建议降低节奏并提前送髋。</p>${btn('发送：重心再压低一点','send-tip','btn primary full')}</div></div></div></div></div>`}
function render(){let r=path();let out=r==='/'?publicHome():r==='/login'?login():r==='/student/home'?studentHome():r==='/student/assessment/analyzing'?analysing():r==='/student/assessment/new'||r.startsWith('/student/assessment/')?assessment():r.startsWith('/student/report/')?reportPage(r.split('/').pop()):r==='/student/progress'?progressPage():r==='/student/ranking'?rankingPage():r==='/student/profile'?profilePage():r==='/coach/dashboard'?coachDashboard():r==='/coach/students'?coachStudents():r.startsWith('/coach/students/')?coachStudentDetail(r.split('/').pop()):r==='/coach/live'?coachLive():r==='/coach/reviews'?reviewsPage():r==='/coach/plans'?plansPage():r==='/coach/schedule'?schedulePage():r==='/coach/operations'?operationsPage():publicHome();$('#app').innerHTML=out;bind();}
function toast(msg,type=''){let old=$('.toast');if(old)old.remove();let el=document.createElement('div');el.className='toast '+type;el.textContent=msg;document.body.append(el);setTimeout(()=>el.remove(),3100)}
let deferredInstallPrompt=null;
window.addEventListener('beforeinstallprompt',event=>{event.preventDefault();deferredInstallPrompt=event});
document.addEventListener('click',async event=>{let button=event.target.closest('[data-action="install-app"]');if(!button)return;event.preventDefault();if(deferredInstallPrompt){deferredInstallPrompt.prompt();let choice=await deferredInstallPrompt.userChoice;toast(choice.outcome==='accepted'?'已开始安装应用。':'已取消安装。');deferredInstallPrompt=null;return}toast('安卓请使用浏览器菜单“安装应用”；iPhone 请在 Safari 分享菜单中选择“添加到主屏幕”。')},true);
if('serviceWorker' in navigator&&/^https?:$/.test(location.protocol)){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}))}
let recordTimer,analysisTimer;function bind(){document.querySelectorAll('[data-route]').forEach(e=>e.onclick=()=>go(e.dataset.route));document.querySelectorAll('[data-action]').forEach(e=>e.onclick=()=>act(e.dataset.action,e));let search=$('#studentSearch');if(search)search.oninput=e=>{state.query=e.target.value;render()}}
function act(a,e){if(a==='help')return toast('演示提示：从 AI 评测开始可完整体验闭环。');if(a==='notify')return toast('暂无新的提醒。');if(a==='login'||a==='enter-student'){state.role='student';return go('/login')}if(a==='enter-coach'){state.role='coach';return go('/login')}if(a==='login-student'){state.role='student';return render()}if(a==='login-coach'){state.role='coach';return render()}if(a==='login-submit')return go(state.role==='student'?'/student/home':'/coach/dashboard');if(a==='switch-role'){state.role=state.role==='student'?'coach':'student';return go(state.role==='student'?'/student/home':'/coach/dashboard')}if(a==='new-assessment'){state.assessment={step:1,project:'正手攻球',calibrated:0,recording:false,seconds:0};return go('/student/assessment/new')}if(a==='open-report')return go('/student/report/r101');if(a==='coach-task'){if(state.tasksDone)return toast('任务已完成，成长档案已同步。');if(state.tasksAssigned)return toast('已收到教练任务：完成 4 组 × 20 球前送练习。');return toast('教练正在确认训练计划，完成复核后会自动同步。')}if(a==='ranking')return go('/student/ranking');if(a==='toggle-ranking'){state.privacy.ranking=!state.privacy.ranking;return render()}if(a==='toggle-video'){state.privacy.video=!state.privacy.video;return render()}if(a==='unavailable')return toast('此选项在演示数据中保持关闭，以保护隐私。');if(a==='save-profile'||a==='save-report'||a==='save-later')return toast(a==='save-later'?'已保存，可随时继续评测。':'已保存。');if(a==='heat-toggle')return toast('已切换为反手落点视图（模拟）。');if(a==='project'){state.assessment.project=e.dataset.project;return render()}if(a==='assessment-next'){if(state.assessment.step===3&&state.assessment.calibrated<4)toast('已切换到普通视觉模式，仍可继续评测。');state.assessment.step++;return render()}if(a==='assessment-prev'){state.assessment.step--;return render()}if(a==='calibrate'){state.assessment.calibrated++;if(state.assessment.calibrated===4)toast('球台校准完成。');return render()}if(a==='start-record'){state.assessment.recording=true;render();recordTimer=setInterval(()=>{state.assessment.seconds++;let t=$('.rec-time');if(t)t.textContent='00:'+String(state.assessment.seconds).padStart(2,'0');if(state.assessment.seconds>11)clearInterval(recordTimer)},1000);return}if(a==='finish-record'){clearInterval(recordTimer);return startAnalysis()}if(a==='send-report'){reports[0].status='待教练复核';toast('报告已发送给顾言教练，等待复核。');return}if(a==='add-to-plan'){toast('已加入待确认训练计划。');return go('/student/home')}if(a==='coach-live')return go('/coach/live');if(a==='coach-plans')return go('/coach/plans');if(a==='coach-schedule')return go('/coach/schedule');if(a==='coach-reviews')return go('/coach/reviews');if(a==='student-detail'){state.selectedStudent=e.dataset.student;return go('/coach/students/'+state.selectedStudent)}if(a==='view-table')return toast('表格视图已预留；当前展示卡片视图。');if(a==='view-cards')return toast('当前为卡片视图。');if(a==='live-detail'){let s=students.find(x=>x.id===e.dataset.student);document.body.insertAdjacentHTML('beforeend',modalLive(s));return}if(a==='close-live'){return $('#liveModal').remove()}if(a==='send-tip')return toast('指导已发送：重心再压低一点。');if(a==='select-review'){state.reviewId=e.dataset.report;return render()}if(a==='open-selected-report')return go('/student/report/'+state.reviewId);if(a==='confirm-review'||a==='edit-confirm'){let r=reports.find(x=>x.id===state.reviewId);r.status='已确认';state.coachConfirmed=true;toast('已标记为“教练确认”，并同步给学员。');return render()}if(a==='reject-review')return toast('已退回 AI 判断，请补充新的教练意见。');if(a==='generate-plan'){state.planGenerated=true;toast('正在生成 AI 教案草案…');setTimeout(render,500);return}if(a==='assign-task'){state.tasksAssigned=true;state.tasksDone=false;toast('训练任务已分配给林予安。');return}if(a==='copy-plan')return toast('已复制为可编辑的课程模板。');if(a==='create-lesson')return toast('新课程已创建为草稿。');if(a==='save-note')return toast('教练点评已保存。');if(a==='tag-note')return toast('已添加“击球点”标签。');if(a==='voice-note')return toast('语音点评入口已预留（演示版）。');if(a==='code')return toast('演示验证码已填入：123456。');if(a==='complete-task'){state.tasksDone=true;toast('训练任务已完成，成长档案已更新。');return render()}}
function startAnalysis(){state.route='/student/assessment/analyzing';if(location.protocol==='file:'){location.hash=state.route}else{history.pushState({},'',state.route)}$('#app').innerHTML=analysing();bind();let p=31;analysisTimer=setInterval(()=>{p+=17;let el=$('#analysisProgress');if(el)el.style.width=Math.min(p,100)+'%';if(p>=100){clearInterval(analysisTimer);state.assessment.recording=false;go('/student/report/r101')}},360)}
// Simulated live values leave a seam for a future WebSocket data source.
setInterval(()=>document.querySelectorAll('.live-rate').forEach(x=>{let base=Number(x.dataset.rate);x.textContent=Math.max(58,Math.min(94,base+Math.floor(Math.random()*7-3)))+'%'}),2400);
render();
</script>
